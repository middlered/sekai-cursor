<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sekai cursor demo</title>
  <link rel="stylesheet" href="/sekai-cursor/sekai_cursor/sekai-cursor-component.css">
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.4;
      color: #1f2937;
      background: #ffffff;
    }

    .page {
      max-width: 980px;
      margin: 28px auto;
      padding: 0 16px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.2px;
      user-select: none;
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 14px;
      user-select: none;
    }

    .github-link {
      width: 40px;
      height: 40px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      text-decoration: none;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .github-link:hover {
      transform: translateY(-1px);
      border-color: #111827;
      box-shadow: 0 6px 16px rgba(17, 24, 39, 0.12);
    }

    .panel {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      user-select: none;
    }

    .toolbar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .toolbar > div {
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    label {
      font-size: 14px;
      color: #374151;
      font-weight: 600;
    }

    select,
    input,
    textarea,
    button {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 7px 10px;
      background: #ffffff;
      font: inherit;
      color: inherit;
    }

    textarea {
      min-height: 38px;
    }

    button {
      cursor: pointer;
    }

    input:focus,
    textarea:focus,
    select:focus,
    button:focus {
      outline: 2px solid #bfdbfe;
      outline-offset: 1px;
      border-color: #3b82f6;
    }

    .section {
      margin: 10px 0 0;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    .row {
      margin: 8px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .row-grid {
      align-items: stretch;
    }

    .row-grid > * {
      box-sizing: border-box;
      flex: 1 1 calc((100% - 16px) / 3);
      min-width: 220px;
    }

    @media (max-width: 860px) {
      .row-grid > * {
        flex-basis: calc((100% - 8px) / 2);
      }
    }

    @media (max-width: 560px) {
      .row-grid > * {
        flex-basis: 100%;
      }
    }

    .sample {
      padding: 8px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      min-height: 24px;
      background: #ffffff;
      user-select: none;
    }

    .drag-area {
      position: relative;
      width: 100%;
      height: 140px;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      background: #f8fafc;
      overflow: hidden;
    }

    .drag-hint {
      position: absolute;
      left: 10px;
      top: 10px;
      font-size: 12px;
      color: #6b7280;
      pointer-events: none;
      user-select: none;
    }

    .drag-box {
      position: absolute;
      left: 16px;
      top: 36px;
      width: 130px;
      height: 44px;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
      touch-action: none;
      user-select: none;
    }

    .progress-track {
      width: 260px;
      max-width: 100%;
      height: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 40%;
      background: #4a88ff;
      animation: plain-progress 1.2s linear infinite;
      border-radius: 999px;
    }

    @keyframes plain-progress {
      0% {
        transform: translateX(-70%);
      }

      100% {
        transform: translateX(220%);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="title-wrap">
        <h1>Sekai Cursor Demo</h1>
      </div>

      <a class="github-link" href="https://github.com/middlered/sekai-cursor" target="_blank" rel="noopener noreferrer" aria-label="Open project on GitHub" title="Open project on GitHub">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
          <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.03c-3.34.73-4.05-1.61-4.05-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.25 1.84 1.25 1.08 1.85 2.83 1.32 3.52 1 .1-.79.42-1.32.77-1.62-2.67-.3-5.47-1.34-5.47-5.95 0-1.31.47-2.39 1.24-3.23-.12-.31-.54-1.54.12-3.21 0 0 1.01-.32 3.3 1.23a11.4 11.4 0 0 1 6 0c2.29-1.55 3.29-1.23 3.29-1.23.66 1.67.24 2.9.12 3.21.77.84 1.24 1.92 1.24 3.23 0 4.62-2.8 5.65-5.48 5.94.43.37.82 1.1.82 2.22v3.29c0 .32.22.69.83.58A12 12 0 0 0 12 .5Z"/>
        </svg>
      </a>
    </header>

    <div class="panel toolbar">
      <div>
        <label for="modeSelect">Cursor Mode:</label>
        <select id="modeSelect">
          <option value="static">static</option>
          <option value="animated">animated</option>
          <option value="system">system default</option>
        </select>
      </div>

      <div>
        <label for="themeSelect">Cursor Style:</label>
        <select id="themeSelect"></select>
      </div>
    </div>

    <section class="panel section">
    <h2 class="panel-title">Interactive Elements</h2>
    <div class="row">
      <button type="button">button</button>
      <button type="button" data-forbidden="true" disabled>forbidden button</button>
      <a href="#">link</a>
      <label for="demoSelect">label for select</label>
      <select id="demoSelect">
        <option>dropdown</option>
      </select>
    </div>

    <div class="row">
      <input placeholder="input">
      <input data-forbidden="true" value="forbidden input" aria-label="forbidden input" disabled>
      <textarea placeholder="textarea"></textarea>
      <div contenteditable="true">contenteditable</div>
    </div>

    <div class="row" aria-busy="true">
      <div>busy area</div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="40">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="row">
      <div class="drag-area" id="dragArea">
        <div class="drag-hint">Drag the blue block to preview move cursor state</div>
        <div class="drag-box sekai-cursor-move" id="dragBox" data-cursor-state="move" role="button" aria-label="Draggable demo block">Drag me</div>
      </div>
    </div>
    </section>

    <section class="panel section">
    <h2 class="panel-title">Cursor Gallery</h2>
    <div class="row row-grid">
      <div class="sample sekai-cursor-help" data-cursor-state="help">help</div>
      <div class="sample" data-cursor-state="progress" aria-busy="true">progress</div>
      <div class="sample sekai-cursor-wait" data-cursor-state="wait">wait</div>
      <div class="sample sekai-cursor-crosshair" data-cursor-state="crosshair">crosshair</div>
      <div class="sample sekai-cursor-move" data-cursor-state="move">move</div>
      <div class="sample sekai-cursor-ew" data-cursor-state="ew_resize">ew-resize</div>
      <div class="sample sekai-cursor-ns" data-cursor-state="ns_resize">ns-resize</div>
      <div class="sample sekai-cursor-nwse" data-cursor-state="nwse_resize">nwse-resize</div>
      <div class="sample sekai-cursor-nesw" data-cursor-state="nesw_resize">nesw-resize</div>
      <div class="sample sekai-cursor-not" data-cursor-state="not_allowed" data-forbidden="true">not-allowed</div>
      <div class="sample sekai-cursor-up" data-cursor-state="up_arrow">up-arrow</div>
      <div class="sample sekai-cursor-person" data-cursor-state="person">person</div>
      <div class="sample sekai-cursor-pin" data-cursor-state="pin">pin</div>
    </div>
    </section>
  </main>

  <script src="/sekai-cursor/resources/assets/manifest.js"></script>
  <script src="/sekai-cursor/sekai_cursor/sekai-cursor-component.js"></script>
  <script>
    createSekaiCursorComponent({
      host: document.body,
      modeSelect: "#modeSelect",
      themeSelect: "#themeSelect",
      mode: "static",
      theme: "airi",
      assetBase: "/sekai-cursor/resources/assets/"
    });

    const dragArea = document.getElementById("dragArea");
    const dragBox = document.getElementById("dragBox");

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function moveDragBox(clientX, clientY) {
      const areaRect = dragArea.getBoundingClientRect();
      const boxRect = dragBox.getBoundingClientRect();

      const rawLeft = clientX - areaRect.left - offsetX;
      const rawTop = clientY - areaRect.top - offsetY;

      const maxLeft = areaRect.width - boxRect.width;
      const maxTop = areaRect.height - boxRect.height;

      const nextLeft = clamp(rawLeft, 0, maxLeft);
      const nextTop = clamp(rawTop, 0, maxTop);

      dragBox.style.left = `${nextLeft}px`;
      dragBox.style.top = `${nextTop}px`;
    }

    dragBox.addEventListener("pointerdown", (event) => {
      const boxRect = dragBox.getBoundingClientRect();
      isDragging = true;
      offsetX = event.clientX - boxRect.left;
      offsetY = event.clientY - boxRect.top;
      dragBox.setPointerCapture(event.pointerId);
    });

    dragBox.addEventListener("pointermove", (event) => {
      if (!isDragging) {
        return;
      }
      moveDragBox(event.clientX, event.clientY);
    });

    const endDrag = (event) => {
      if (!isDragging) {
        return;
      }
      isDragging = false;
      if (dragBox.hasPointerCapture(event.pointerId)) {
        dragBox.releasePointerCapture(event.pointerId);
      }
    };

    dragBox.addEventListener("pointerup", endDrag);
    dragBox.addEventListener("pointercancel", endDrag);
  </script>
</body>
</html>
